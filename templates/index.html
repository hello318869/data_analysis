<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>交互式数据分析系统</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: "Microsoft YaHei", "PingFang SC", sans-serif; background: #f5f7fa; color: #333; }
        .container { max-width: 800px; margin: 80px auto; text-align: center; }
        h1 { margin-bottom: 24px; color: #409eff; }
        .nav-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-top: 40px; }
        .nav-card { background: #fff; padding: 28px 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,.08); text-decoration: none; color: #333; transition: transform .15s; }
        .nav-card:hover { transform: translateY(-2px); }
        .nav-card h3 { color: #409eff; margin-bottom: 6px; }
        .alert { padding: 10px 16px; border-radius: 4px; margin: 12px 0; }
        .alert-error { background: #fef0f0; color: #f56c6c; border: 1px solid #fde2e2; }
    </style>
</head>
<body>
<div class="container">
    <h1>交互式数据分析系统</h1>
    {% if user %}
        <p>欢迎，{{ user.username }}</p>
    {% endif %}

    {% if error %}
        <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    <div class="nav-cards">
        <a class="nav-card" href="/data/upload"><h3>数据管理</h3><p>上传 CSV / Excel 文件</p></a>
        <a class="nav-card" href="/clean"><h3>数据清洗</h3><p>缺失值处理、异常值检测</p></a>
        <a class="nav-card" href="/viz/show"><h3>可视化</h3><p>生成统计图表</p></a>
        <a class="nav-card" href="/analysis/result"><h3>算法分析</h3><p>回归分析与算法对比</p></a>
    </div>
</div>
</body>
</html>
